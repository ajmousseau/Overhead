<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERHEAD</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#080700; display:flex; align-items:center; justify-content:center; }
  .wrap { text-align:center; font-family:'Courier New', monospace; }
  .title { font-size:48px; letter-spacing:8px; color:#f5a623; margin-bottom:12px; }
  .msg   { font-size:11px; letter-spacing:4px; color:#7a5210; animation: blink 1.2s ease-in-out infinite; }
  .err   { font-size:11px; letter-spacing:3px; color:#c04020; margin-top:12px; display:none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">OVERHEAD</div>
  <div class="msg" id="msg">LOADING...</div>
  <div class="err" id="err"></div>
</div>
<script>
// ?? CONFIG ???????????????????????????????????????????????????????
// Update REPO_OWNER and REPO_NAME to match your GitHub repository
const REPO_OWNER = 'ajmousseau';   // ? your GitHub username
const REPO_NAME  = 'Overhead';  // ? your repo name
// ?????????????????????????????????????????????????????????????????

async function findLatest() {
  try {
    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
    const r = await fetch(url, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error(`GitHub API ${r.status}`);
    const files = await r.json();

    // Find all flightboard_v*.html files
    const versions = files
      .map(f => f.name)
      .filter(n => /^flightboard_v[\d.]+\.html$/i.test(n));

    if (!versions.length) throw new Error('No flightboard_v*.html files found in repo');

    // Sort by version number — handles v1.0, v1.1, v1.10, v2.0 etc
    versions.sort((a, b) => {
      const parse = name => name.match(/v([\d.]+)/i)[1].split('.').map(Number);
      const av = parse(a), bv = parse(b);
      for (let i = 0; i < Math.max(av.length, bv.length); i++) {
        const diff = (bv[i] || 0) - (av[i] || 0);
        if (diff !== 0) return diff;
      }
      return 0;
    });

    const latest = versions[0];
    document.getElementById('msg').textContent = `REDIRECTING TO ${latest.toUpperCase()}`;
    window.location.replace(latest);

  } catch (e) {
    document.getElementById('msg').style.display = 'none';
    const err = document.getElementById('err');
    err.style.display = 'block';
    err.textContent = `ERROR: ${e.message}`;
    console.error('Redirect failed:', e);
  }
}

findLatest();
</script>
</body>
</html>
